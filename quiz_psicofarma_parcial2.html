<style>
:root{
  --cream:#FBF7EF;
  --ink:#241F1A;
  --plum:#5B3A6E;
  --plum-dim:#8a6a9c;

  --gold:#C99A3A;
  --line:#E4DCC9;
  --card:#FFFFFF;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--cream);
  color:var(--ink);
  font-family:'Iowan Old Style','Georgia',serif;
  line-height:1.5;
}
.topbar{
  position:sticky; top:0; z-index:10;
  background:var(--cream);
  border-bottom:2px solid var(--ink);
  padding:14px 24px;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  flex-wrap:wrap;
}
.brand{display:flex; flex-direction:column; gap:2px;}
.brand .eyebrow{
  font-family:'JetBrains Mono', monospace;
  font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--plum-dim);
}
.brand h1{margin:0; font-size:20px; font-weight:600;}
.stats{
  display:flex; gap:18px; font-family:'JetBrains Mono', monospace; font-size:13px;
}
.stat{display:flex; flex-direction:column; align-items:flex-end;}
.stat b{font-size:18px; color:var(--plum);}
#progressWrap{
  height:4px; background:var(--line); width:100%;
}
#progressBar{height:100%; background:var(--plum); width:0%; transition:width .25s;}

.container{max-width:760px; margin:0 auto; padding:28px 20px 100px;}

.qcard{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:2px;
  padding:22px 24px;
  margin-bottom:16px;
  position:relative;
  box-shadow:0 1px 0 rgba(0,0,0,.03);
}
.qcard.correct{border-left:5px solid var(--moss);}
.qcard.wrong{border-left:5px solid var(--rust);}
.qnum{
  font-family:'JetBrains Mono', monospace; font-size:11px;
  color:var(--plum-dim); letter-spacing:.08em; text-transform:uppercase;
}
.qtext{font-size:17px; margin:6px 0 14px; font-weight:600;}
.options{display:flex; flex-direction:column; gap:8px;}
.opt{
  display:flex; align-items:flex-start; gap:10px;
  border:1px solid var(--line); border-radius:2px;
  padding:10px 12px; cursor:pointer;
  font-size:15px;
  transition:background .15s, border-color .15s;
  background:#fffdf9;
}
.opt:hover{border-color:var(--plum-dim);}
.opt input{margin-top:3px; accent-color:var(--plum);}
.opt.sel{border-color:var(--plum); background:#f4eef8;}
.opt.show-correct{border-color:var(--moss); background:#eef5ee;}
.opt.show-wrong{border-color:var(--rust); background:#f7eae6;}
.opt .letter{
  font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--plum-dim);
  width:16px; flex-shrink:0;
}
.feedback{
  margin-top:12px; font-family:'JetBrains Mono', monospace; font-size:13px;
  display:none;
}
.feedback.show{display:block;}
.feedback.ok{color:var(--moss);}
.feedback.bad{color:var(--rust);}

.footer-bar{
  position:fixed; bottom:0; left:0; right:0;
  background:var(--cream);
  border-top:2px solid var(--ink);
  padding:14px 24px;
  display:flex; justify-content:center; gap:14px; flex-wrap:wrap;
}
button{
  font-family:'JetBrains Mono', monospace;
  font-size:13px; letter-spacing:.04em; text-transform:uppercase;
  padding:10px 18px; border-radius:2px; border:1.5px solid var(--ink);
  background:var(--ink); color:var(--cream); cursor:pointer;
}
button.secondary{background:transparent; color:var(--ink);}
button:hover{opacity:.85;}

.summary{
  text-align:center; padding:30px 20px; border:1px solid var(--line); background:var(--card); margin-bottom:20px;
}
.summary h2{margin:0 0 6px; font-size:26px;}
.summary .score{font-family:'JetBrains Mono', monospace; font-size:42px; color:var(--plum); margin:10px 0;}

@media(max-width:600px){
  .topbar{padding:12px 16px;}
  .stats{gap:10px;}
  .container{padding:20px 14px 110px;}
}
</style>
</head>

const letters = ['A','B','C','D','E','F'];
const state = QUESTIONS.map(()=>({answered:false, selected:null}));

const container = document.getElementById('container');
const statAnswered = document.getElementById('statAnswered');
const statCorrect = document.getElementById('statCorrect');
const progressBar = document.getElementById('progressBar');

function render(){
  container.innerHTML = '';
  QUESTIONS.forEach((q,qi)=>{
    const card = document.createElement('div');
    card.className = 'qcard';
    card.id = 'q'+qi;

    const num = document.createElement('div');
    num.className = 'qnum';
    num.textContent = 'Pregunta '+(qi+1)+' de '+QUESTIONS.length;
    card.appendChild(num);

    const qt = document.createElement('div');
    qt.className = 'qtext';
    qt.textContent = q.q.replace(/^\d+\.\s*/,'');
    card.appendChild(qt);

    const opts = document.createElement('div');
    opts.className = 'options';
    q.o.forEach((optText, oi)=>{
      const lbl = document.createElement('label');
      lbl.className = 'opt';
      lbl.innerHTML = '<span class="letter">'+letters[oi]+'</span><span>'+optText+'</span>';
      lbl.addEventListener('click', ()=>selectAnswer(qi, oi));
      opts.appendChild(lbl);
    });
    card.appendChild(opts);

    const fb = document.createElement('div');
    fb.className = 'feedback';
    fb.id = 'fb'+qi;
    card.appendChild(fb);

    container.appendChild(card);
  });
  updateStats();
}

function selectAnswer(qi, oi){
  const s = state[qi];
  if(s.answered) return; // lock after first answer
  s.answered = true;
  s.selected = oi;

  const card = document.getElementById('q'+qi);
  const optEls = card.querySelectorAll('.opt');
  const q = QUESTIONS[qi];
  const isCorrect = oi === q.c;

  optEls.forEach((el,idx)=>{
    if(idx===oi) el.classList.add('sel');
    if(idx===q.c) el.classList.add('show-correct');
    else if(idx===oi) el.classList.add('show-wrong');
  });

  card.classList.add(isCorrect ? 'correct' : 'wrong');

  const fb = document.getElementById('fb'+qi);
  fb.classList.add('show');
  if(isCorrect){
    fb.classList.add('ok');
    fb.textContent = '✓ Correcto.';
  } else {
    fb.classList.add('bad');
    fb.textContent = '✗ Incorrecto. Rta correcta: '+letters[q.c]+') '+q.o[q.c];
  }
  updateStats();
}

function updateStats(){
  const answered = state.filter(s=>s.answered).length;
  const correct = state.filter((s,i)=>s.answered && s.selected===QUESTIONS[i].c).length;
  statAnswered.textContent = answered+'/'+QUESTIONS.length;
  statCorrect.textContent = correct;
  progressBar.style.width = (answered/QUESTIONS.length*100)+'%';
}

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!confirm('¿Reiniciar todas las respuestas?')) return;
  state.forEach(s=>{s.answered=false; s.selected=null;});
  render();
  window.scrollTo({top:0, behavior:'smooth'});
});

document.getElementById('finishBtn').addEventListener('click', ()=>{
  const answered = state.filter(s=>s.answered).length;
  const correct = state.filter((s,i)=>s.answered && s.selected===QUESTIONS[i].c).length;
  const unanswered = QUESTIONS.length - answered;
  let pct = answered ? Math.round(correct/answered*100) : 0;
  alert('Resultado:\n\nRespondidas: '+answered+'/'+QUESTIONS.length+
        (unanswered ? ' ('+unanswered+' sin responder)' : '')+
        '\nCorrectas: '+correct+
        '\nPorcentaje sobre respondidas: '+pct+'%');
});

render();
</script>
